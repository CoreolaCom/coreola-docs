name: Deploy docs

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run build

      - name: Run postbuild
        run: npm run postbuild

      - name: Prepare SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Check secret presence
        shell: bash
        run: |
          test -n "${{ secrets.SSH_HOST }}" && echo "SSH_HOST is set"
          test -n "${{ secrets.SSH_USER }}" && echo "SSH_USER is set"
          test -n "${{ secrets.SSH_PRIVATE_KEY }}" && echo "SSH_PRIVATE_KEY is set"

      - name: Validate private key format
        shell: bash
        run: |
          ssh-keygen -y -f ~/.ssh/id_rsa > /tmp/derived.pub
          echo "Private key parsed successfully"

      - name: Test SSH connection
        shell: bash
        run: |
          ssh -vvv -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "whoami && hostname"

      - name: Deploy via rsync
        shell: bash
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o BatchMode=yes" \
            out/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/palaemo/web/docs.coreola.com/public_html"